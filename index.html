<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Cycle Tracker</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f4f4f9;
      color: #333;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 { margin-top: 0; }
    h3 { margin-bottom: 10px; }
    label { font-weight: bold; display: block; margin-top: 15px; }
    
    input[type="date"], textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea { resize: vertical; }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .log-btn { background-color: #5c67f2; color: white; }
    .log-btn:hover { background-color: #4a54e1; }
    
    .history { margin-top: 30px; border-top: 2px solid #eee; padding-top: 15px; }
    
    .year-tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      margin-bottom: 15px;
      padding-bottom: 5px;
    }
    .year-tab {
      padding: 6px 14px;
      background: #e0e0e0;
      color: #333;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      margin-top: 0;
      width: auto;
      font-weight: normal;
    }
    .year-tab.active { background: #5c67f2; color: white; font-weight: bold; }
    .year-tab:hover:not(.active) { background: #d0d0d0; }

    .cycle-entry {
      background: #f9f9f9;
      padding: 15px 10px;
      border-left: 4px solid #5c67f2;
      margin-bottom: 10px;
      border-radius: 4px;
      line-height: 1.5;
      position: relative;
    }
    /* New style for ongoing cycles */
    .cycle-entry.ongoing {
      border-left: 4px solid #ff9800;
      background: #fff8eb;
    }
    .ongoing-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff9800;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: bold;
    }

    .update-box {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #ffe0b2;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .update-box input[type="date"] {
      margin-top: 0;
      padding: 6px;
    }
    .update-btn {
      margin-top: 0;
      padding: 8px 12px;
      background-color: #ff9800;
      color: white;
      width: auto;
      font-size: 14px;
      white-space: nowrap;
    }
    .update-btn:hover { background-color: #e68a00; }

    .stats {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #ccc;
      font-size: 0.9em;
      color: #555;
    }
    .notes-display {
      margin-top: 10px;
      padding: 10px;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 4px;
      font-size: 0.9em;
      color: #444;
      white-space: pre-wrap;
    }
    .delete-btn {
      background: none; color: #d9534f; padding: 0; margin-top: 10px;
      font-size: 14px; text-decoration: underline; width: auto; font-weight: normal; cursor: pointer;
    }
    .delete-btn:hover { background: none; color: #c9302c; }

    /* Backup Section Styling */
    .backup-section {
      margin-top: 30px;
      padding: 15px;
      background: #f0f0f5;
      border-radius: 8px;
      text-align: center;
    }
    .backup-btn { background-color: #333; color: white; padding: 10px; margin-top: 10px; }
    .backup-btn:hover { background-color: #222; }
    .restore-btn { background-color: transparent; color: #5c67f2; border: 1px solid #5c67f2; padding: 10px; margin-top: 10px; }
    .restore-btn:hover { background-color: #e8eaf6; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Cycle Tracker</h2>
    
    <label for="startDate">Period Start Date (Required):</label>
    <input type="date" id="startDate">
    
    <label for="endDate">Period End Date (Optional):</label>
    <input type="date" id="endDate">

    <label for="cycleNotes">Notes (Symptoms, flow, etc.):</label>
    <textarea id="cycleNotes" rows="3" placeholder="Add any details about your cycle here..."></textarea>
    
    <button class="log-btn" onclick="saveCycle()">Log Cycle</button>

    <div class="history">
      <h3>Your Logged Cycles</h3>
      <div id="yearTabs" class="year-tabs"></div>
      <div id="historyList"></div>
    </div>

    <div class="backup-section">
      <h3>Backup & Restore</h3>
      <p style="font-size: 0.85em; color: #666; margin-top: 0;">Save your data to a file, or load it onto a new device.</p>
      <button class="backup-btn" onclick="exportData()">Export Backup File</button>
      <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
      <button class="restore-btn" onclick="document.getElementById('importFile').click()">Import Data</button>
    </div>
  </div>

  <script>
    let currentYearFilter = 'All';

    document.addEventListener("DOMContentLoaded", displayCycles);

    function calculateDaysBetween(date1, date2) {
      const d1 = new Date(date1);
      const d2 = new Date(date2);
      return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
    }

    function saveCycle() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value; // Now optional
      const notes = document.getElementById('cycleNotes').value;

      if (!start) {
        alert("Please select a start date.");
        return;
      }
      if (end && new Date(end) < new Date(start)) {
        alert("End date cannot be before the start date.");
        return;
      }

      const cycle = { id: Date.now(), start: start, end: end, notes: notes };
      
      let cycles = JSON.parse(localStorage.getItem('myCycles')) || [];
      cycles.push(cycle);
      cycles.sort((a, b) => new Date(b.start) - new Date(a.start));
      
      localStorage.setItem('myCycles', JSON.stringify(cycles));
      
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('cycleNotes').value = '';
      
      currentYearFilter = start.split('-')[0]; 
      displayCycles();
    }

    // NEW FUNCTION: Easily update the end date later
    function updateEndDate(id) {
      const endInput = document.getElementById(`update-end-${id}`).value;
      
      if (!endInput) {
        alert("Please select an end date to save.");
        return;
      }

      let cycles = JSON.parse(localStorage.getItem('myCycles')) || [];
      const cycleIndex = cycles.findIndex(c => c.id === id);

      if (cycleIndex !== -1) {
        if (new Date(endInput) < new Date(cycles[cycleIndex].start)) {
          alert("End date cannot be before the start date.");
          return;
        }
        
        cycles[cycleIndex].end = endInput;
        localStorage.setItem('myCycles', JSON.stringify(cycles));
        displayCycles();
      }
    }

    function deleteCycle(id) {
      if(confirm("Are you sure you want to delete this log?")) {
        let cycles = JSON.parse(localStorage.getItem('myCycles')) || [];
        cycles = cycles.filter(cycle => cycle.id !== id);
        localStorage.setItem('myCycles', JSON.stringify(cycles));
        displayCycles();
      }
    }

    function exportData() {
      const data = localStorage.getItem('myCycles') || '[]';
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const today = new Date().toISOString().split('T')[0];
      a.download = `cycle-tracker-backup-${today}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedData = JSON.parse(e.target.result);
          if (Array.isArray(importedData)) {
            if(confirm("This will replace all your current logs with the backup data. Proceed?")) {
              localStorage.setItem('myCycles', JSON.stringify(importedData));
              displayCycles();
              alert("Data successfully restored!");
            }
          } else { alert("This doesn't look like a valid backup file."); }
        } catch (error) { alert("Error reading the file. Please make sure it is a valid .json file."); }
        event.target.value = '';
      };
      reader.readAsText(file);
    }

    function renderYearTabs(cycles) {
      const tabsContainer = document.getElementById('yearTabs');
      tabsContainer.innerHTML = '';
      if (cycles.length === 0) return;

      const years = new Set(cycles.map(c => c.start.split('-')[0]));
      const sortedYears = Array.from(years).sort((a, b) => b - a);
      sortedYears.unshift('All');

      if (!sortedYears.includes(currentYearFilter)) { currentYearFilter = 'All'; }

      sortedYears.forEach(year => {
        const btn = document.createElement('button');
        btn.className = `year-tab ${year === currentYearFilter ? 'active' : ''}`;
        btn.textContent = year;
        btn.onclick = () => { currentYearFilter = year; displayCycles(); };
        tabsContainer.appendChild(btn);
      });
    }

    function displayCycles() {
      let cycles = JSON.parse(localStorage.getItem('myCycles')) || [];
      const list = document.getElementById('historyList');
      list.innerHTML = "";

      renderYearTabs(cycles);

      if (cycles.length === 0) {
        list.innerHTML = "<p>No cycles logged yet.</p>";
        return;
      }

      const cyclesWithStats = cycles.map((cycle, index) => {
        // Handle period length
        let periodLengthText = "<em>Ongoing...</em>";
        if (cycle.end) {
          const periodLength = calculateDaysBetween(cycle.start, cycle.end) + 1;
          periodLengthText = `<strong>${periodLength} days</strong>`;
        }
        
        // Handle cycle length
        let cycleLengthText = "<em>Needs next period to calculate</em>";
        if (index < cycles.length - 1) {
          const previousCycle = cycles[index + 1];
          const cycleLength = calculateDaysBetween(previousCycle.start, cycle.start);
          cycleLengthText = `<strong>${cycleLength} days</strong>`;
        }
        
        return { 
          ...cycle, 
          periodLengthText: periodLengthText, 
          cycleLengthText: cycleLengthText, 
          year: cycle.start.split('-')[0]
        };
      });

      const displayList = currentYearFilter === 'All' 
        ? cyclesWithStats 
        : cyclesWithStats.filter(c => c.year === currentYearFilter);

      if (displayList.length === 0) {
        list.innerHTML = `<p>No cycles found for ${currentYearFilter}.</p>`;
        return;
      }

      displayList.forEach(cycle => {
        let notesHtml = '';
        if (cycle.notes && cycle.notes.trim() !== '') {
          const escapedNotes = cycle.notes.replace(/</g, "&lt;").replace(/>/g, "&gt;");
          notesHtml = `<div class="notes-display"><strong>Notes:</strong><br>${escapedNotes}</div>`;
        }

        const isOngoing = !cycle.end;
        const entryDiv = document.createElement('div');
        entryDiv.className = `cycle-entry ${isOngoing ? 'ongoing' : ''}`;
        
        let endDisplayHtml = isOngoing 
          ? `<div class="update-box">
               <input type="date" id="update-end-${cycle.id}">
               <button class="update-btn" onclick="updateEndDate(${cycle.id})">Save End</button>
             </div>`
          : `<strong>End:</strong> ${cycle.end} <br>`;

        let badgeHtml = isOngoing ? `<span class="ongoing-badge">Active</span>` : '';

        entryDiv.innerHTML = `
          ${badgeHtml}
          <strong>Start:</strong> ${cycle.start} <br>
          ${endDisplayHtml}
          <div class="stats">
            Period lasted: ${cycle.periodLengthText} <br>
            Total cycle length: ${cycle.cycleLengthText}
          </div>
          ${notesHtml}
          <button class="delete-btn" onclick="deleteCycle(${cycle.id})">Remove</button>
        `;
        list.appendChild(entryDiv);
      });
    }
  </script>
</body>
</html>
